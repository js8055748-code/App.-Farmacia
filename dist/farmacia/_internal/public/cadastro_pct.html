<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cadastrar Paciente — Farmácia</title>
  <!-- style.css deve estar em /public/style.css -->
  <link rel="stylesheet" href="style.css" />
  <script src="auth.js"></script>
</head>
<body>

  <header>
    <span class="logo-icon">💊</span>
    <h1>Sistema Farmácia</h1>
    <nav>
      <a href="index.html">🏠 <span>Início</span></a>
      <a href="cadastro_pct.html" class="ativo">👤 <span>Pacientes</span></a>
      <a href="lancar_medicacao.html">💉 <span>Dispensar</span></a>
      <a href="estoque.html">📦 <span>Estoque</span></a>
    </nav>
  </header>

  <main>
    <div class="page-title">
      <button class="back" onclick="location.href='index.html'">← Voltar</button>
      <h2>Cadastrar Paciente</h2>
    </div>

    <div class="card-form">
      <div id="alerta" class="alerta"></div>

      <form id="form-paciente">
        <div class="form-grid">

          <div class="campo full">
            <label for="nome">Nome completo *</label>
            <input type="text" id="nome" placeholder="Ex: Maria da Silva" required />
          </div>

          <div class="campo">
            <label for="cpf">CPF *</label>
            <input type="text" id="cpf" placeholder="000.000.000-00" maxlength="14" required />
          </div>

          <div class="campo">
            <label for="data_nascimento">Data de nascimento</label>
            <input type="date" id="data_nascimento" />
          </div>

          <div class="campo">
            <label for="telefone">WhatsApp / Telefone</label>
            <input type="text" id="telefone" placeholder="5537999999999" />
            <span style="font-size:11px; color: var(--cinza-400);">
              Com DDI e DDD, sem espaços ou +
            </span>
          </div>

          <div class="campo full">
            <label for="endereco">Endereço</label>
            <input type="text" id="endereco" placeholder="Rua, número, bairro, cidade" />
          </div>

        </div>

        <div class="form-acoes">
          <button type="button" class="btn btn-outline" onclick="limparForm()">Limpar</button>
          <button type="submit" class="btn btn-primario" id="btn-salvar">💾 Salvar paciente</button>
        </div>
      </form>
    </div>
  </main>

  <script>
    // Máscara CPF
    document.getElementById('cpf').addEventListener('input', function () {
      let v = this.value.replace(/\D/g, '').slice(0, 11);
      if (v.length > 9) v = v.replace(/(\d{3})(\d{3})(\d{3})(\d{1,2})/, '$1.$2.$3-$4');
      else if (v.length > 6) v = v.replace(/(\d{3})(\d{3})(\d{1,3})/, '$1.$2.$3');
      else if (v.length > 3) v = v.replace(/(\d{3})(\d{1,3})/, '$1.$2');
      this.value = v;
    });

    function mostrarAlerta(msg, tipo) {
      const el = document.getElementById('alerta');
      el.textContent = msg;
      el.className = `alerta ${tipo} visivel`;
      setTimeout(() => el.classList.remove('visivel'), 4000);
    }

    function limparForm() {
      document.getElementById('form-paciente').reset();
    }

    document.getElementById('form-paciente').addEventListener('submit', async function (e) {
      e.preventDefault();

      const btn = document.getElementById('btn-salvar');
      btn.disabled = true;
      btn.textContent = 'Salvando...';

      const body = {
        nome: document.getElementById('nome').value.trim(),
        cpf: document.getElementById('cpf').value.trim(),
        data_nascimento: document.getElementById('data_nascimento').value || null,
        telefone: document.getElementById('telefone').value.trim() || null,
        endereco: document.getElementById('endereco').value.trim() || null
      };

      console.log('ENVIANDO BODY /api/pacientes:', body);

      try {
        const res = await fetch('/api/pacientes', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });

        const data = await res.json();
        console.log('RESPOSTA /api/pacientes:', res.status, data);

        if (res.ok) {
          mostrarAlerta('✅ Paciente cadastrado com sucesso!', 'sucesso');
          limparForm();
        } else {
          mostrarAlerta('❌ ' + (data.erro || 'Erro ao salvar paciente.'), 'erro');
        }
      } catch (err) {
        console.error('Erro no fetch /api/pacientes:', err);
        mostrarAlerta('❌ Erro de conexão com o servidor.', 'erro');
      } finally {
        btn.disabled = false;
        btn.innerHTML = '💾 Salvar paciente';
      }
    });
  </script>

</body>
</html>
