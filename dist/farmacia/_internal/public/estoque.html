<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Estoque — Farmácia</title>
  <link rel="stylesheet" href="style.css" />
  <script src="auth.js"></script>
</head>
<body>

  <header>
    <span class="logo-icon">💊</span>
    <h1>Sistema Farmácia</h1>
    <nav>
      <a href="index.html">🏠 <span>Início</span></a>
      <a href="cadastro_pct.html">👤 <span>Pacientes</span></a>
      <a href="lancar_medicacao.html">💉 <span>Dispensar</span></a>
      <a href="estoque.html" class="ativo">📦 <span>Estoque</span></a>
    </nav>
  </header>

  <main>
    <div class="page-title">
      <button class="back" onclick="history.back()">← Voltar</button>
      <h2>Estoque de Medicamentos</h2>
      <div style="margin-left:auto; display:flex; gap:8px;">
        <button class="btn btn-outline" onclick="abrirModalAdicionar()">+ Adicionar medicação</button>
        <button class="btn btn-primario" onclick="abrirModalNovoRemume()">+ Novo medicamento</button>
      </div>
    </div>

    <div class="card-form">
      <div id="alerta-estoque" class="alerta"></div>

      <!-- Barra de busca -->
      <div class="campo" style="margin-bottom: 16px; max-width: 320px;">
        <input type="text" id="busca-med" placeholder="🔍 Buscar medicamento..." oninput="filtrarTabela()" />
      </div>

      <div class="tabela-wrap">
        <table id="tabela-estoque">
          <thead>
            <tr>
              <th>Medicamento</th>
              <th>Apresentação</th>
              <th>Controlado</th>
              <th>Estoque</th>
              <th>Ação</th>
            </tr>
          </thead>
          <tbody id="tbody-estoque">
            <tr><td colspan="5" style="text-align:center; color:var(--cinza-400); padding:32px;">
              Carregando...
            </td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <!-- Modal novo/editar medicamento -->
  <div id="modal-overlay" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,.4); z-index:200; align-items:center; justify-content:center;">
    <div style="background:var(--branco); border-radius:var(--radius); padding:28px; width:100%; max-width:480px; margin:16px; box-shadow: 0 20px 40px rgba(0,0,0,.2);">
      <h3 id="modal-titulo" style="margin-bottom:20px; font-size:17px;">Novo medicamento</h3>

      <div class="form-grid">
        <input type="hidden" id="med-id" />

        <div class="campo full">
          <label>Nome *</label>
          <input type="text" id="med-nome" placeholder="Ex: Paracetamol" />
        </div>
        <div class="campo full">
          <label>Princípio ativo</label>
          <input type="text" id="med-principio" placeholder="Ex: Paracetamol 500mg" />
        </div>
        <div class="campo">
          <label>Apresentação</label>
          <input type="text" id="med-apresentacao" placeholder="Ex: Comprimido 500mg" />
        </div>
        <div class="campo">
          <label>Estoque inicial</label>
          <input type="number" id="med-estoque" min="0" value="0" />
        </div>
        <div class="campo full" style="flex-direction:row; align-items:center; gap:10px;">
          <input type="checkbox" id="med-controlado" style="width:16px; height:16px;" />
          <label for="med-controlado" style="font-size:14px; cursor:pointer;">Medicamento controlado</label>
        </div>
      </div>

      <div class="form-acoes">
        <button class="btn btn-outline" onclick="fecharModal()">Cancelar</button>
        <button class="btn btn-primario" onclick="salvarMedicamento()">💾 Salvar</button>
      </div>
    </div>
  </div>

  <script>
    let todosOsMeds = [];

    async function carregarEstoque() {
      try {
        const res = await fetch('/api/medicamentos');
        const data = await res.json();
        todosOsMeds = data.medicamentos || [];
        renderizarTabela(todosOsMeds);
      } catch (e) {
        document.getElementById('tbody-estoque').innerHTML =
          '<tr><td colspan="5" style="text-align:center;color:var(--vermelho);">Erro ao carregar estoque.</td></tr>';
      }
    }

    function renderizarTabela(meds) {
      const tbody = document.getElementById('tbody-estoque');

      if (meds.length === 0) {
        tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:var(--cinza-400);padding:32px;">Nenhum medicamento cadastrado.</td></tr>';
        return;
      }

      tbody.innerHTML = meds.map(m => {
        let badgeClass = 'badge-ok';
        let badgeLabel = 'OK';
        if (m.estoque === 0)      { badgeClass = 'badge-zero'; badgeLabel = 'Zerado'; }
        else if (m.estoque <= 10) { badgeClass = 'badge-low';  badgeLabel = 'Baixo'; }

        return `
          <tr>
            <td><strong>${m.nome}</strong>${m.principio_ativo ? `<br><span style="font-size:12px;color:var(--cinza-400)">${m.principio_ativo}</span>` : ''}</td>
            <td>${m.apresentacao || '—'}</td>
            <td>${m.controlado ? '⚠️ Sim' : 'Não'}</td>
            <td>
              <span class="badge ${badgeClass}">${m.estoque} un.</span>
              &nbsp;
              <span class="${badgeClass === 'badge-ok' ? '' : 'badge ' + badgeClass}" style="font-size:11px;">${badgeLabel}</span>
            </td>
            <td>
              <button class="btn btn-outline" style="padding:5px 10px;font-size:12px;" onclick="abrirModalEditar(${m.id})">✏️ Editar</button>
            </td>
          </tr>
        `;
      }).join('');
    }

    function filtrarTabela() {
      const termo = document.getElementById('busca-med').value.toLowerCase();
      const filtrados = todosOsMeds.filter(m =>
        m.nome.toLowerCase().includes(termo) ||
        (m.principio_ativo || '').toLowerCase().includes(termo)
      );
      renderizarTabela(filtrados);
    }

    function abrirModalNovo() {
      document.getElementById('modal-titulo').textContent = 'Novo medicamento';
      document.getElementById('med-id').value = '';
      document.getElementById('med-nome').value = '';
      document.getElementById('med-principio').value = '';
      document.getElementById('med-apresentacao').value = '';
      document.getElementById('med-estoque').value = '0';
      document.getElementById('med-controlado').checked = false;
      document.getElementById('modal-overlay').style.display = 'flex';
    }

    function abrirModalEditar(id) {
      const m = todosOsMeds.find(x => x.id === id);
      if (!m) return;
      document.getElementById('modal-titulo').textContent = 'Editar medicamento';
      document.getElementById('med-id').value = m.id;
      document.getElementById('med-nome').value = m.nome;
      document.getElementById('med-principio').value = m.principio_ativo || '';
      document.getElementById('med-apresentacao').value = m.apresentacao || '';
      document.getElementById('med-estoque').value = m.estoque;
      document.getElementById('med-controlado').checked = m.controlado;
      document.getElementById('modal-overlay').style.display = 'flex';
    }

    function fecharModal() {
      document.getElementById('modal-overlay').style.display = 'none';
    }

    async function salvarMedicamento() {
      const id = document.getElementById('med-id').value;
      const body = {
        nome:           document.getElementById('med-nome').value.trim(),
        principio_ativo: document.getElementById('med-principio').value.trim() || null,
        apresentacao:   document.getElementById('med-apresentacao').value.trim() || null,
        estoque:        parseInt(document.getElementById('med-estoque').value) || 0,
        controlado:     document.getElementById('med-controlado').checked,
      };

      if (!body.nome) return alert('Informe o nome do medicamento.');

      try {
        const url    = id ? `/api/medicamentos/${id}` : '/api/medicamentos';
        const method = id ? 'PUT' : 'POST';

        const res  = await fetch(url, { method, headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
        const data = await res.json();

        if (res.ok) {
          fecharModal();
          carregarEstoque();
          const el = document.getElementById('alerta-estoque');
          el.textContent = id ? '✅ Medicamento atualizado.' : '✅ Medicamento cadastrado.';
          el.className = 'alerta sucesso visivel';
          setTimeout(() => el.classList.remove('visivel'), 3000);
        } else {
          alert(data.erro || 'Erro ao salvar.');
        }
      } catch (e) {
        alert('Erro de conexão.');
      }
    }

    // Fecha modal clicando fora
    document.getElementById('modal-overlay').addEventListener('click', function (e) {
      if (e.target === this) fecharModal();
    });

    carregarEstoque();
  </script>

  <!-- Modal: Novo medicamento via REMUME -->
  <div id="modal-remume-overlay" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,.4); z-index:200; align-items:center; justify-content:center;">
    <div style="background:var(--branco); border-radius:var(--radius); padding:28px; width:100%; max-width:480px; margin:16px; box-shadow:0 20px 40px rgba(0,0,0,.2);">
      <h3 style="margin-bottom:20px; font-size:17px;">Novo medicamento</h3>

      <div class="form-grid">
        <div class="campo full">
          <label>Buscar na lista REMUME *</label>
          <div style="position:relative;">
            <input type="text" id="remume-busca" placeholder="Digite o nome do medicamento..." autocomplete="off" style="width:100%;" />
            <div id="remume-sugestoes" style="position:absolute; top:38px; left:0; background:white; border:1px solid #ccc; width:100%; max-height:200px; overflow-y:auto; display:none; z-index:10; border-radius:4px; box-shadow:0 4px 12px rgba(0,0,0,.1); font-size:13px;"></div>
          </div>
        </div>

        <div id="remume-campos-selecionado" style="display:none; grid-column:1 / -1;">
          <div class="campo full">
            <label>Medicamento selecionado</label>
            <input type="text" id="remume-nome-mostra" readonly style="background:#f5f5f5; color:var(--cinza-700);" />
          </div>
          <div class="campo full">
            <label>Apresentação</label>
            <input type="text" id="remume-apresentacao-mostra" readonly style="background:#f5f5f5; color:var(--cinza-700);" />
          </div>
        </div>

        <div class="campo">
          <label>Quantidade inicial em estoque</label>
          <input type="number" id="remume-quantidade" min="0" value="0" />
        </div>
        <div class="campo full" style="flex-direction:row; align-items:center; gap:10px;">
          <input type="checkbox" id="remume-controlado" style="width:16px; height:16px;" />
          <label for="remume-controlado" style="font-size:14px; cursor:pointer;">Medicamento controlado</label>
        </div>
      </div>

      <div class="form-acoes">
        <button class="btn btn-outline" onclick="fecharModalRemume()">Cancelar</button>
        <button class="btn btn-primario" onclick="salvarNovoRemume()">💾 Salvar</button>
      </div>
    </div>
  </div>

  <!-- Modal: Adicionar medicação (entrada de estoque) -->
  <div id="modal-adicionar-overlay" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,.4); z-index:200; align-items:center; justify-content:center;">
    <div style="background:var(--branco); border-radius:var(--radius); padding:28px; width:100%; max-width:480px; margin:16px; box-shadow:0 20px 40px rgba(0,0,0,.2);">
      <h3 style="margin-bottom:20px; font-size:17px;">Adicionar ao estoque</h3>

      <div class="form-grid">
        <div class="campo full">
          <label>Buscar medicamento cadastrado *</label>
          <div style="position:relative;">
            <input type="text" id="adicionar-busca" placeholder="Digite o nome do medicamento..." autocomplete="off" style="width:100%;" />
            <div id="adicionar-sugestoes" style="position:absolute; top:38px; left:0; background:white; border:1px solid #ccc; width:100%; max-height:200px; overflow-y:auto; display:none; z-index:10; border-radius:4px; box-shadow:0 4px 12px rgba(0,0,0,.1); font-size:13px;"></div>
          </div>
        </div>

        <div id="adicionar-campos-selecionado" style="display:none; grid-column:1 / -1;">
          <div class="campo full">
            <label>Medicamento</label>
            <input type="text" id="adicionar-nome-mostra" readonly style="background:#f5f5f5; color:var(--cinza-700);" />
          </div>
          <div class="campo full">
            <label>Estoque atual</label>
            <input type="text" id="adicionar-estoque-atual" readonly style="background:#f5f5f5; color:var(--cinza-700);" />
          </div>
        </div>

        <div class="campo">
          <label>Quantidade a adicionar *</label>
          <input type="number" id="adicionar-quantidade" min="1" placeholder="0" />
        </div>
      </div>

      <div class="form-acoes">
        <button class="btn btn-outline" onclick="fecharModalAdicionar()">Cancelar</button>
        <button class="btn btn-primario" onclick="salvarAdicionar()">+ Adicionar ao estoque</button>
      </div>
    </div>
  </div>

  <script>
    // === NOVO MEDICAMENTO VIA REMUME ===
    let remumeTimer = null;
    let remumeSelecionado = null;

    function abrirModalNovoRemume() {
      document.getElementById('remume-busca').value = '';
      document.getElementById('remume-sugestoes').style.display = 'none';
      document.getElementById('remume-campos-selecionado').style.display = 'none';
      document.getElementById('remume-nome-mostra').value = '';
      document.getElementById('remume-apresentacao-mostra').value = '';
      document.getElementById('remume-quantidade').value = '0';
      document.getElementById('remume-controlado').checked = false;
      remumeSelecionado = null;
      document.getElementById('modal-remume-overlay').style.display = 'flex';
      document.getElementById('remume-busca').focus();
    }

    function fecharModalRemume() {
      document.getElementById('modal-remume-overlay').style.display = 'none';
    }

    document.getElementById('remume-busca').addEventListener('input', function () {
      remumeSelecionado = null;
      document.getElementById('remume-campos-selecionado').style.display = 'none';
      clearTimeout(remumeTimer);
      const term = this.value.trim();
      if (term.length < 2) { document.getElementById('remume-sugestoes').style.display = 'none'; return; }
      remumeTimer = setTimeout(() => buscarRemume(term), 250);
    });

    async function buscarRemume(term) {
      try {
        const res = await fetch(`/api/remume?term=${encodeURIComponent(term)}`);
        const data = await res.json();
        const div = document.getElementById('remume-sugestoes');
        if (!data || data.length === 0) { div.style.display = 'none'; return; }
        div.innerHTML = data.map(m => `
          <div style="padding:8px 12px; cursor:pointer; border-bottom:1px solid #eee;"
               onmousedown="selecionarRemume('${m.nome.replace(/\\/g, '\\\\').replace(/'/g, "\\'")}', '${(m.apresentacao||'').replace(/\\/g, '\\\\').replace(/'/g, "\\'")}')"
               onmouseover="this.style.background='#f0f4ff'"
               onmouseout="this.style.background=''">
            <strong>${m.nome}</strong>
            ${m.apresentacao ? `<span style="color:#888; font-size:11px;"> · ${m.apresentacao}</span>` : ''}
          </div>
        `).join('');
        div.style.display = 'block';
      } catch (e) {
        document.getElementById('remume-sugestoes').style.display = 'none';
      }
    }

    function selecionarRemume(nome, apresentacao) {
      remumeSelecionado = { nome, apresentacao };
      document.getElementById('remume-busca').value = nome;
      document.getElementById('remume-nome-mostra').value = nome;
      document.getElementById('remume-apresentacao-mostra').value = apresentacao;
      document.getElementById('remume-campos-selecionado').style.display = 'block';
      document.getElementById('remume-sugestoes').style.display = 'none';
    }

    async function salvarNovoRemume() {
      if (!remumeSelecionado) return alert('Selecione um medicamento da lista REMUME.');
      const quantidade = parseInt(document.getElementById('remume-quantidade').value) || 0;
      const controlado = document.getElementById('remume-controlado').checked;
      try {
        const res = await fetch('/api/medicamentos', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            nome: remumeSelecionado.nome,
            principio_ativo: null,
            apresentacao: remumeSelecionado.apresentacao || null,
            estoque: quantidade,
            controlado
          })
        });
        const data = await res.json();
        if (res.ok) {
          fecharModalRemume();
          carregarEstoque();
          const el = document.getElementById('alerta-estoque');
          el.textContent = '✅ Medicamento cadastrado no estoque.';
          el.className = 'alerta sucesso visivel';
          setTimeout(() => el.classList.remove('visivel'), 3000);
        } else {
          alert(data.erro || 'Erro ao salvar.');
        }
      } catch (e) {
        alert('Erro de conexão.');
      }
    }

    document.getElementById('modal-remume-overlay').addEventListener('click', function (e) {
      if (e.target === this) fecharModalRemume();
    });

    document.addEventListener('click', function (e) {
      const div = document.getElementById('remume-sugestoes');
      if (!div.contains(e.target) && e.target !== document.getElementById('remume-busca')) {
        div.style.display = 'none';
      }
    });

    // === ADICIONAR MEDICAÇÃO (ENTRADA NO ESTOQUE) ===
    let adicionarTimer = null;
    let adicionarSelecionado = null;

    function abrirModalAdicionar() {
      document.getElementById('adicionar-busca').value = '';
      document.getElementById('adicionar-sugestoes').style.display = 'none';
      document.getElementById('adicionar-campos-selecionado').style.display = 'none';
      document.getElementById('adicionar-nome-mostra').value = '';
      document.getElementById('adicionar-estoque-atual').value = '';
      document.getElementById('adicionar-quantidade').value = '';
      adicionarSelecionado = null;
      document.getElementById('modal-adicionar-overlay').style.display = 'flex';
      document.getElementById('adicionar-busca').focus();
    }

    function fecharModalAdicionar() {
      document.getElementById('modal-adicionar-overlay').style.display = 'none';
    }

    document.getElementById('adicionar-busca').addEventListener('input', function () {
      adicionarSelecionado = null;
      document.getElementById('adicionar-campos-selecionado').style.display = 'none';
      clearTimeout(adicionarTimer);
      const term = this.value.trim();
      if (term.length < 2) { document.getElementById('adicionar-sugestoes').style.display = 'none'; return; }
      adicionarTimer = setTimeout(() => buscarMedAdicionar(term), 250);
    });

    async function buscarMedAdicionar(term) {
      try {
        const res = await fetch(`/api/medicamentos?term=${encodeURIComponent(term)}`);
        const data = await res.json();
        const lista = Array.isArray(data) ? data : (data.medicamentos || []);
        const div = document.getElementById('adicionar-sugestoes');
        if (!lista || lista.length === 0) { div.style.display = 'none'; return; }
        div.innerHTML = lista.map(m => `
          <div style="padding:8px 12px; cursor:pointer; border-bottom:1px solid #eee;"
               onmousedown="selecionarMedAdicionar(${m.id}, '${m.nome.replace(/\\/g, '\\\\').replace(/'/g, "\\'")}', ${m.estoque ?? 0})"
               onmouseover="this.style.background='#f0f4ff'"
               onmouseout="this.style.background=''">
            <strong>${m.nome}</strong>
            ${m.apresentacao ? `<span style="color:#888; font-size:11px;"> · ${m.apresentacao}</span>` : ''}
            <span style="float:right; font-size:11px; color:${(m.estoque ?? 0) === 0 ? '#e53e3e' : (m.estoque ?? 0) <= 10 ? '#dd6b20' : '#38a169'};">
              Estoque: ${m.estoque ?? 0}
            </span>
          </div>
        `).join('');
        div.style.display = 'block';
      } catch (e) {
        document.getElementById('adicionar-sugestoes').style.display = 'none';
      }
    }

    function selecionarMedAdicionar(id, nome, estoqueAtual) {
      adicionarSelecionado = { id, nome, estoqueAtual };
      document.getElementById('adicionar-busca').value = nome;
      document.getElementById('adicionar-nome-mostra').value = nome;
      document.getElementById('adicionar-estoque-atual').value = `${estoqueAtual} unidades`;
      document.getElementById('adicionar-campos-selecionado').style.display = 'block';
      document.getElementById('adicionar-sugestoes').style.display = 'none';
    }

    async function salvarAdicionar() {
      if (!adicionarSelecionado) return alert('Selecione um medicamento.');
      const quantidade = parseInt(document.getElementById('adicionar-quantidade').value);
      if (!quantidade || quantidade <= 0) return alert('Informe uma quantidade válida.');
      try {
        const res = await fetch(`/api/medicamentos/${adicionarSelecionado.id}/adicionar-estoque`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ quantidade })
        });
        const data = await res.json();
        if (res.ok) {
          fecharModalAdicionar();
          carregarEstoque();
          const el = document.getElementById('alerta-estoque');
          el.textContent = `✅ +${quantidade} unidades adicionadas ao estoque de ${adicionarSelecionado.nome}.`;
          el.className = 'alerta sucesso visivel';
          setTimeout(() => el.classList.remove('visivel'), 4000);
        } else {
          alert(data.erro || 'Erro ao atualizar estoque.');
        }
      } catch (e) {
        alert('Erro de conexão.');
      }
    }

    document.getElementById('modal-adicionar-overlay').addEventListener('click', function (e) {
      if (e.target === this) fecharModalAdicionar();
    });

    document.addEventListener('click', function (e) {
      const div = document.getElementById('adicionar-sugestoes');
      if (!div.contains(e.target) && e.target !== document.getElementById('adicionar-busca')) {
        div.style.display = 'none';
      }
    });
  </script>

</body>
</html>
