<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cadastrar Usuario — Farmácia</title>
  <script>
    if (location.protocol === 'file:') {
      var page = location.pathname.split(/[\\/]/).pop() || 'cadastro_usuario.html';
      location.replace('http://localhost:3000/' + page);
    }
  </script>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

    <main>
    <div class="page-title">
      <button class="back" onclick="location.href='login.html'">← Voltar</button>
      <h2>Cadastrar Usuario</h2>
    </div>

    <div class="card-form">
      <div id="alerta" class="alerta"></div>

      <form id="form-paciente">
        <div class="form-grid">

          <div class="campo full">
            <label for="nome">Nome completo *</label>
            <input type="text" id="nome" placeholder="Ex: Maria da Silva" required />
          </div>

          <div class="campo">
            <label for="cpf">CPF * <span style="font-size:11px; color:var(--cinza-400);">(será sua senha inicial)</span></label>
            <input type="text" id="cpf" placeholder="000.000.000-00" maxlength="14" required />
          </div>

          <div class="campo">
            <label for="data_nascimento">Data de nascimento</label>
            <input type="date" id="data_nascimento" />
          </div>

          <div class="campo full">
            <label for="email">E-mail *</label>
            <input type="email" id="email" placeholder="seuemail@exemplo.com" required />
          </div>

          <div class="campo">
            <label for="telefone">WhatsApp / Telefone</label>
            <input type="text" id="telefone" placeholder="37999999999" />
            <span style="font-size:11px; color: var(--cinza-400);">Com DDD, sem espaços.</span>
          </div>

        </div>

        <div style="background:#eff6ff; border:1px solid #bfdbfe; border-radius:8px; padding:12px 16px; margin:16px 0; font-size:13px; color:#1e40af;">
          Após o cadastro, seu primeiro acesso será feito com o <strong>e-mail</strong> e seu <strong>CPF como senha</strong>.
        </div>

        <div class="form-acoes">
          <button type="button" class="btn btn-outline" onclick="limparForm()">Limpar</button>
          <button type="submit" class="btn btn-primario" id="btn-salvar">💾 Salvar Usuario</button>
        </div>
      </form>
    </div>
  </main>

  <script>
    function mostrarAlerta(msg, tipo) {
      var el = document.getElementById('alerta');
      el.textContent = msg;
      el.className = 'alerta visivel ' + tipo;
    }

    function limparForm() {
      document.getElementById('form-paciente').reset();
      var el = document.getElementById('alerta');
      el.className = 'alerta';
    }

    document.getElementById('form-paciente').addEventListener('submit', function (e) {
      e.preventDefault();

      var nome = document.getElementById('nome').value.trim();
      var cpf = document.getElementById('cpf').value.trim();
      var dataNasc = document.getElementById('data_nascimento').value;
      var email = document.getElementById('email').value.trim();
      var telefone = document.getElementById('telefone').value.trim();

      if (!nome || !email || !cpf) {
        return mostrarAlerta('Nome, e-mail e CPF são obrigatórios.', 'erro');
      }

      var btn = document.getElementById('btn-salvar');
      btn.disabled = true;
      btn.textContent = 'Salvando...';

      fetch('/api/usuarios', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          nome: nome,
          cpf: cpf,
          data_nascimento: dataNasc,
          email: email,
          telefone: telefone
        })
      })
        .then(function (r) { return r.json(); })
        .then(function (data) {
          if (data.ok) {
            mostrarAlerta('Usuário cadastrado! Acesse com seu e-mail e CPF como senha. Redirecionando...', 'sucesso');
            document.getElementById('form-paciente').reset();
            setTimeout(function () { window.location.href = 'login.html'; }, 3000);
          } else {
            mostrarAlerta(data.erro || 'Erro ao cadastrar usuário.', 'erro');
            btn.disabled = false;
            btn.textContent = '💾 Salvar Usuario';
          }
        })
        .catch(function () {
          mostrarAlerta('Erro de conexão com o servidor.', 'erro');
          btn.disabled = false;
          btn.textContent = '💾 Salvar Usuario';
        });
    });
  </script>
</body>
</html>
