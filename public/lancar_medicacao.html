<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lançar Medicação — Farmácia</title>
  <link rel="stylesheet" href="style.css" />
  <script src="auth.js"></script>
</head>

<body>
  <header>
    <span class="logo-icon">💊</span>
    <h1>Sistema Farmácia</h1>
    <nav>
      <a href="index.html">🏠 <span>Início</span></a>
      <a href="cadastro_pct.html">👤 <span>Pacientes</span></a>
      <a href="lancar_medicacao.html" class="ativo">💉 <span>Dispensar</span></a>
      <a href="estoque.html">📦 <span>Estoque</span></a>
    </nav>
  </header>

  <main>
    <div class="page-title">
      <button class="back" onclick="history.back()">← Voltar</button>
      <h2>Lançar Medicação</h2>
    </div>

    <!-- Busca por CPF -->
    <div class="card-form" style="margin-bottom: 20px;">
      <div class="busca-cpf">
        <div class="campo">
          <label for="cpf-busca">Buscar paciente pelo CPF</label>
          <input type="text" id="cpf-busca" placeholder="000.000.000-00" maxlength="14" />
        </div>
        <button class="btn btn-primario" onclick="buscarPaciente()">🔍 Buscar</button>
        <button class="btn btn-outline" onclick="buscarHistorico()">🕒 Histórico</button>
      </div>
      <div id="alerta-busca" class="alerta"></div>
    </div>

    <!-- Card paciente encontrado -->
    <div class="paciente-card" id="paciente-card">
      <strong id="paciente-nome"></strong><br />
      <span id="paciente-info"></span>
    </div>

    <!-- Histórico -->
    <div id="historico-disp" class="card-form" style="display:none; margin-top: 10px;">
      <h3 style="font-size:14px; margin-bottom:8px;">Histórico de medicações dispensadas</h3>
      <div id="historico-disp-lista" style="font-size:13px;"></div>
    </div>

    <!-- Formulário de dispensação (oculto até encontrar paciente) -->
    <div class="card-form" id="form-dispensacao-wrap" style="display:none;">
      <div id="alerta-disp" class="alerta"></div>

      <div class="form-grid" style="margin-bottom: 8px;">
        <div class="campo">
          <label for="dias-retirada">Próxima retirada (em dias) *</label>
          <input type="number" id="dias-retirada" min="1" value="90" required />
        </div>
        <div class="campo">
          <label>Data próxima retirada</label>
          <input type="text" id="data-retirada-mostra" readonly />
        </div>
        <div class="campo">
          <label>Data renovação receita</label>
          <input type="text" id="data-renovacao-mostra" readonly />
        </div>
        <div class="campo full">
          <label for="obs-disp">Observações</label>
          <input type="text" id="obs-disp" placeholder="Opcional" />
        </div>
      </div>

      <small style="font-size:12px; color:var(--cinza-500); display:block; margin-bottom:12px;">
        A próxima retirada é calculada como <strong>hoje + dias</strong>.
        A renovação da receita é <strong>15 dias antes</strong> da próxima retirada.
      </small>

      <label style="font-size:13px; font-weight:600; color:var(--cinza-600);">
        Medicamentos dispensados *
      </label>

      <!-- Linha de inserção manual -->
      <div style="display: flex; gap: 8px; margin-top: 4px; position: relative; flex-wrap: wrap; align-items: center;">
        <div style="position: relative; flex: 1; min-width: 200px;">
          <input
            type="text"
            id="medicamento_nome"
            name="medicamento_nome"
            placeholder="Nome do medicamento"
            autocomplete="off"
            style="width: 100%;"
          />
          <div
            id="sugestoes_medicamento"
            style="
              position: absolute;
              top: 36px;
              left: 0;
              background: white;
              border: 1px solid #ccc;
              width: 100%;
              max-height: 180px;
              overflow-y: auto;
              display: none;
              z-index: 10;
              font-size: 13px;
              border-radius: 4px;
              box-shadow: 0 4px 12px rgba(0,0,0,.1);
            ">
          </div>
        </div>

        <span
          id="estoque-disponivel"
          style="font-size: 12px; color: var(--cinza-500); white-space: nowrap; display: none;">
          Estoque: <strong id="estoque-qtd">—</strong>
        </span>

        <input
          type="number"
          id="medicamento_quantidade"
          name="medicamento_quantidade"
          min="1"
          placeholder="Qtd"
          style="width: 80px;"
        />

        <select id="medicamento_unidade" name="medicamento_unidade" style="width: 90px;">
          <option value="COMP">COMP</option>
          <option value="CX">CX</option>
          <option value="AMP">AMP</option>
          <option value="FR">FR</option>
        </select>
      </div>

      <!-- Botão para adicionar medicamento -->
      <button
        type="button"
        class="btn-add-med"
        onclick="adicionarMedicamentoManual()"
        style="margin-top: 8px;"
      >
        + Adicionar medicamento
      </button>

      <!-- Lista dinâmica de medicamentos adicionados -->
      <div class="med-lista" id="med-lista"></div>

      <div class="form-acoes">
        <button type="button" class="btn btn-outline" onclick="cancelarDispensacao()">Cancelar</button>
        <button type="button" class="btn btn-sucesso" onclick="salvarDispensacao()">
          ✅ Confirmar dispensação
        </button>
      </div>
    </div>
  </main>

  <script>
    let pacienteAtual = null;
    let medSelecionadoId = null;
    let medSelecionadoEstoque = null;
    let timerAutoComplete = null;
    let mensagemWhatsappAtual = null;

    // --- Máscara CPF ---
    document.getElementById('cpf-busca').addEventListener('input', function () {
      let v = this.value.replace(/\D/g, '').slice(0, 11);
      if (v.length > 9) v = v.replace(/(\d{3})(\d{3})(\d{3})(\d{1,2})/, '$1.$2.$3-$4');
      else if (v.length > 6) v = v.replace(/(\d{3})(\d{3})(\d{1,3})/, '$1.$2.$3');
      else if (v.length > 3) v = v.replace(/(\d{3})(\d{1,3})/, '$1.$2');
      this.value = v;
    });

    document.getElementById('cpf-busca').addEventListener('keydown', function (e) {
      if (e.key === 'Enter') buscarPaciente();
    });

    function mostrarAlerta(id, msg, tipo) {
      const el = document.getElementById(id);
      el.textContent = msg;
      el.className = `alerta ${tipo} visivel`;
      setTimeout(() => el.classList.remove('visivel'), 5000);
    }

    // -------- Buscar paciente pelo CPF --------
    async function buscarPaciente() {
      const cpf = document.getElementById('cpf-busca').value.trim();
      if (!cpf) return mostrarAlerta('alerta-busca', 'Informe o CPF.', 'erro');

      try {
        const res = await fetch(`/api/pacientes/cpf/${encodeURIComponent(cpf)}`);
        const data = await res.json();

        if (!res.ok || !data.paciente) {
          pacienteAtual = null;
          document.getElementById('paciente-card').classList.remove('visivel');
          document.getElementById('form-dispensacao-wrap').style.display = 'none';
          document.getElementById('historico-disp').style.display = 'none';
          return mostrarAlerta('alerta-busca', '❌ Paciente não encontrado.', 'erro');
        }

        pacienteAtual = data.paciente;
        document.getElementById('paciente-nome').textContent = pacienteAtual.nome;
        document.getElementById('paciente-info').textContent =
          `CPF: ${pacienteAtual.cpf} · Telefone: ${pacienteAtual.telefone || 'não informado'}`;
        document.getElementById('paciente-card').classList.add('visivel');
        document.getElementById('form-dispensacao-wrap').style.display = 'block';
        document.getElementById('med-lista').innerHTML = '';
        mensagemWhatsappAtual = null;
        atualizarDatasCalculadas();
      } catch (err) {
        console.error('Erro ao buscar paciente:', err);
        mostrarAlerta('alerta-busca', '❌ Erro de conexão.', 'erro');
      }
    }

    // -------- Histórico de dispensações --------
    async function buscarHistorico() {
      if (!pacienteAtual) {
        const cpf = document.getElementById('cpf-busca').value.trim();
        if (!cpf) {
          return mostrarAlerta('alerta-busca', 'Informe o CPF ou busque o paciente primeiro.', 'erro');
        }
        await buscarPaciente();
        if (!pacienteAtual) return;
      }

      try {
        const url = `/api/dispensacoes/paciente/${pacienteAtual.id}`;
        console.log('URL HISTORICO:', url);

        const res = await fetch(url);
        let data;
        try {
          data = await res.json();
        } catch (e) {
          console.error('Resposta não é JSON, status:', res.status);
          throw e;
        }

        console.log('HISTORICO DISP:', res.status, data);

        if (!res.ok) {
          return mostrarAlerta(
            'alerta-busca',
            data.erro || 'Erro ao buscar histórico de dispensação.',
            'erro'
          );
        }

        const listaDiv = document.getElementById('historico-disp-lista');
        const wrap = document.getElementById('historico-disp');

        if (!data.dispensacoes || data.dispensacoes.length === 0) {
          listaDiv.innerHTML = '<p>Sem dispensações registradas para este paciente.</p>';
          wrap.style.display = 'block';
          return;
        }

        const itensHtml = data.dispensacoes
          .map((d) => {
            const meds = d.medicamentos && d.medicamentos.length
              ? d.medicamentos
                  .map(
                    (m) =>
                      `&nbsp;&nbsp;- ${m.nome} (Qtd: ${m.quantidade}${m.unidade ? ' ' + m.unidade : ''})`
                  )
                  .join('<br>')
              : '&nbsp;&nbsp;- (medicamentos não detalhados)';

            return `
              <div class="historico-item" style="margin-bottom:8px; padding-bottom:6px; border-bottom:1px solid #eee;">
                <div><strong>Data retirada:</strong> ${d.data_proxima_retirada}</div>
                <div><strong>Renovação:</strong> ${d.data_para_renovacao}</div>
                <div><strong>Observações:</strong> ${d.observacoes || '-'}</div>
                <div><strong>Medicamentos:</strong><br>${meds}</div>
              </div>
            `;
          })
          .join('');

        listaDiv.innerHTML = itensHtml;
        wrap.style.display = 'block';
      } catch (err) {
        console.error('Erro ao buscar histórico:', err);
        mostrarAlerta('alerta-busca', 'Erro de conexão ao buscar histórico.', 'erro');
      }
    }

    // -------- Autocomplete de medicamentos --------
    const inputNome = document.getElementById('medicamento_nome');
    const divSugestoes = document.getElementById('sugestoes_medicamento');
    const spanEstoque = document.getElementById('estoque-disponivel');
    const spanEstoqueQtd = document.getElementById('estoque-qtd');

    inputNome.addEventListener('input', function () {
      medSelecionadoId = null;
      medSelecionadoEstoque = null;
      spanEstoque.style.display = 'none';

      clearTimeout(timerAutoComplete);
      const termo = this.value.trim();
      if (termo.length < 2) { divSugestoes.style.display = 'none'; return; }

      timerAutoComplete = setTimeout(() => buscarSugestoes(termo), 250);
    });

    async function buscarSugestoes(termo) {
      try {
        const res = await fetch(`/api/medicamentos?term=${encodeURIComponent(termo)}`);
        const data = await res.json();
        const lista = Array.isArray(data) ? data : (data.medicamentos || []);

        if (lista.length === 0) { divSugestoes.style.display = 'none'; return; }

        divSugestoes.innerHTML = lista.map(m => `
          <div style="padding: 8px 12px; cursor: pointer; border-bottom: 1px solid #eee;"
               onmousedown="selecionarMedicamento(${m.id}, '${m.nome.replace(/'/g, "\\'")}', ${m.estoque ?? 0})"
               onmouseover="this.style.background='#f0f4ff'"
               onmouseout="this.style.background=''">
            <strong>${m.nome}</strong>
            ${m.apresentacao ? `<span style="color:#888; font-size:11px;"> · ${m.apresentacao}</span>` : ''}
            <span style="float:right; font-size:11px; color:${(m.estoque ?? 0) === 0 ? '#e53e3e' : (m.estoque ?? 0) <= 10 ? '#dd6b20' : '#38a169'};">
              Estoque: ${m.estoque ?? 0}
            </span>
          </div>
        `).join('');
        divSugestoes.style.display = 'block';
      } catch (e) {
        divSugestoes.style.display = 'none';
      }
    }

    function selecionarMedicamento(id, nome, estoque) {
      inputNome.value = nome;
      medSelecionadoId = id;
      medSelecionadoEstoque = estoque;
      divSugestoes.style.display = 'none';

      spanEstoqueQtd.textContent = estoque;
      spanEstoqueQtd.style.color = estoque === 0 ? '#e53e3e' : estoque <= 10 ? '#dd6b20' : '#38a169';
      spanEstoque.style.display = 'inline';
    }

    document.addEventListener('click', function (e) {
      if (!divSugestoes.contains(e.target) && e.target !== inputNome) {
        divSugestoes.style.display = 'none';
      }
    });

    function removerMedicamento(id) {
      const el = document.getElementById(id);
      if (el) el.remove();
    }

    function cancelarDispensacao() {
      pacienteAtual = null;
      document.getElementById('cpf-busca').value = '';
      document.getElementById('paciente-card').classList.remove('visivel');
      document.getElementById('form-dispensacao-wrap').style.display = 'none';
      document.getElementById('historico-disp').style.display = 'none';
      document.getElementById('med-lista').innerHTML = '';
      document.getElementById('data-retirada-mostra').value = '';
      document.getElementById('data-renovacao-mostra').value = '';
      document.getElementById('obs-disp').value = '';
      document.getElementById('medicamento_nome').value = '';
      document.getElementById('medicamento_quantidade').value = '';
      document.getElementById('medicamento_unidade').value = 'COMP';
      mensagemWhatsappAtual = null;
    }

    // ---- Cálculo e exibição das datas ----
    const inputDias = document.getElementById('dias-retirada');
    inputDias.addEventListener('input', atualizarDatasCalculadas);

    function atualizarDatasCalculadas() {
      const diasRetirada = Number(inputDias.value);
      const campoRetirada = document.getElementById('data-retirada-mostra');
      const campoRenovacao = document.getElementById('data-renovacao-mostra');

      if (!diasRetirada || diasRetirada <= 0) {
        campoRetirada.value = '';
        campoRenovacao.value = '';
        return;
      }

      const hoje = new Date();
      const calcData = (base, deltaDias) => {
        const d = new Date(base.getTime());
        d.setDate(d.getDate() + deltaDias);
        const ano = d.getFullYear();
        const mes = String(d.getMonth() + 1).padStart(2, '0');
        const dia = String(d.getDate()).padStart(2, '0');
        return { iso: `${ano}-${mes}-${dia}`, br: `${dia}/${mes}/${ano}` };
      };

      const retirada = calcData(hoje, diasRetirada);
      const renovacao = calcData(new Date(retirada.iso), -15);

      campoRetirada.value = retirada.br;
      campoRenovacao.value = renovacao.br;
      campoRetirada.dataset.iso = retirada.iso;
      campoRenovacao.dataset.iso = renovacao.iso;
    }

    // --- Adicionar medicamento na lista ---
    function adicionarMedicamentoManual() {
      const inputMedNome = document.getElementById('medicamento_nome');
      const qtdInput = document.getElementById('medicamento_quantidade');
      const unidadeSelect = document.getElementById('medicamento_unidade');

      const nome = inputMedNome.value.trim();
      const quantidade = Number(qtdInput.value);
      const unidade = unidadeSelect.value;

      if (!nome || !quantidade || quantidade <= 0) {
        return mostrarAlerta('alerta-disp', '❌ Informe o nome do medicamento e uma quantidade válida.', 'erro');
      }

      const lista = document.getElementById('med-lista');
      const idx = Date.now();
      const estoqueAtual = medSelecionadoEstoque;
      const corEstoque = estoqueAtual === null ? '' :
        estoqueAtual === 0 ? 'color:#e53e3e' :
          estoqueAtual <= 10 ? 'color:#dd6b20' : 'color:#38a169';
      const estoqueInfo = estoqueAtual !== null
        ? `<span style="font-size:11px;${corEstoque}"> · Estoque: ${estoqueAtual}</span>`
        : '';

      const item = document.createElement('div');
      item.className = 'med-item';
      item.id = `med-${idx}`;
      item.dataset.medicamentoId = medSelecionadoId || '';
      item.dataset.nome = nome;

      item.innerHTML = `
        <div class="campo">
          <label>Medicamento</label>
          <input type="text" value="${nome}" readonly />
          ${estoqueInfo}
        </div>
        <div class="campo">
          <label>Quantidade</label>
          <input type="number" value="${quantidade}" min="1" readonly />
        </div>
        <div class="campo">
          <label>Unidade</label>
          <input type="text" value="${unidade}" readonly />
        </div>
        <button type="button" class="btn-remover" onclick="removerMedicamento('med-${idx}')" title="Remover">✕</button>
      `;

      lista.appendChild(item);

      inputMedNome.value = '';
      qtdInput.value = '';
      unidadeSelect.value = 'COMP';
      medSelecionadoId = null;
      medSelecionadoEstoque = null;
      spanEstoque.style.display = 'none';
      divSugestoes.style.display = 'none';
    }

    // --- Abrir WhatsApp ---
    function abrirWhatsappPaciente(numero, mensagem) {
      const telefoneLimpo = (numero || '').replace(/\D/g, '');
      if (!telefoneLimpo || !mensagem) return;

      const texto = encodeURIComponent(mensagem);
      const url = `https://wa.me/${telefoneLimpo}?text=${texto}`;
      window.open(url, '_blank');
    }

    // --- Salvar dispensação ---
    async function salvarDispensacao() {
      if (!pacienteAtual) return;

      const diasRetirada = Number(document.getElementById('dias-retirada').value);
      if (!diasRetirada || diasRetirada <= 0) {
        return mostrarAlerta('alerta-disp', '❌ Informe os dias para próxima retirada.', 'erro');
      }

      const campoRetirada = document.getElementById('data-retirada-mostra');
      const campoRenovacao = document.getElementById('data-renovacao-mostra');

      if (!campoRetirada.dataset.iso || !campoRenovacao.dataset.iso) {
        atualizarDatasCalculadas();
      }

      const dataRetiradaISO = campoRetirada.dataset.iso;
      const dataRenovacaoISO = campoRenovacao.dataset.iso;

      const itens = [];
      document.querySelectorAll('#med-lista .med-item').forEach((item) => {
        const nome = item.dataset.nome;
        const medicamentoId = item.dataset.medicamentoId || null;
        const qtdInput = item.querySelector('input[type="number"]');
        const qtd = qtdInput ? Number(qtdInput.value) : 0;
        const unidadeInput = item.querySelectorAll('input[type="text"]')[1];
        const unidade = unidadeInput ? unidadeInput.value : null;

        if (nome && qtd && qtd > 0) {
          itens.push({
            medicamento_id: medicamentoId ? parseInt(medicamentoId) : null,
            nome,
            quantidade: qtd,
            unidade,
          });
        }
      });

      if (itens.length === 0) {
        return mostrarAlerta('alerta-disp', '❌ Adicione ao menos um medicamento.', 'erro');
      }

      const formatarData = (iso) => {
        const [ano, mes, dia] = iso.split('-');
        return `${dia}-${mes}-${ano}`;
      };

      const body = {
        paciente_id: pacienteAtual.id,
        nome_paciente: pacienteAtual.nome || null,
        telefone: pacienteAtual.telefone || null,
        medicamentos: itens,
        data_proxima_retirada: formatarData(dataRetiradaISO),
        data_para_renovacao: formatarData(dataRenovacaoISO),
        observacoes: document.getElementById('obs-disp').value.trim() || null,
      };

      try {
        const res = await fetch('/api/dispensar', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });

        const data = await res.json();

        if (res.ok) {
          // Monta texto do WhatsApp com base nos dados da própria tela
          const medsLinha = itens
            .map(m => `- ${m.nome} (Qtd: ${m.quantidade}${m.unidade ? ' ' + m.unidade : ''})`)
            .join('\n');

          mensagemWhatsappAtual =
            `Olá, ${pacienteAtual.nome}!\n\n` +
            `Sua retirada de medicamentos foi registrada.\n\n` +
            `Medicamentos:\n${medsLinha}\n\n` +
            `Próxima retirada: ${body.data_proxima_retirada}.\n` +
            `Renovação da receita: ${body.data_para_renovacao}.\n` +
            `Esta mensagem não precisa ser respondida!`;

          mostrarAlerta(
            'alerta-disp',
            '✅ Dispensação registrada! Abrindo WhatsApp para enviar a mensagem.',
            'sucesso'
          );

          // Abre WhatsApp com a mensagem
          if (pacienteAtual.telefone && mensagemWhatsappAtual) {
            abrirWhatsappPaciente(pacienteAtual.telefone, mensagemWhatsappAtual);
          }

          // Limpa imediatamente para nova dispensação
          cancelarDispensacao();
        } else {
          mostrarAlerta('alerta-disp', '❌ ' + (data.erro || 'Erro ao registrar.'), 'erro');
        }
      } catch (err) {
        console.error('Erro ao salvar dispensação:', err);
        mostrarAlerta('alerta-disp', '❌ Erro de conexão com o servidor.', 'erro');
      }
    }
  </script>
</body>
</html>
